name: personal_financial_assistant
description: "家庭资产管理系统 - 多端支持的家庭金融资产与负债管理应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 本地数据库
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Web 平台数据库支持
  drift_flutter: ^0.2.4

  # 路由
  go_router: ^14.8.1

  # 网络请求
  dio: ^5.7.0

  # 图表
  fl_chart: ^0.70.2

  # 图片选择
  image_picker: ^1.1.2

  # WebDAV
  webdav_client: ^1.2.2

  # 文件操作
  file_picker: ^8.1.7

  # JSON 序列化
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 本地存储（偏好设置）
  shared_preferences: ^2.3.4

  # 国际化/格式化
  intl: ^0.19.0

  # UUID 生成
  uuid: ^4.5.1

  # 加密
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # URL launcher
  url_launcher: ^6.3.1

  # 权限管理
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/demo/
