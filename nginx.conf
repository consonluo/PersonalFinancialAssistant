server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 启用 gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 1000;

    # Flutter Web SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebDAV CORS 代理 -> 坚果云
    location /webdav-proxy/ {
        # 处理 CORS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PROPFIND, MKCOL, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth, Destination, Overwrite' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }

        # 代理到坚果云 WebDAV
        proxy_pass https://dav.jianguoyun.com/dav/;
        proxy_set_header Host dav.jianguoyun.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;

        # CORS 头
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PROPFIND, MKCOL' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth' always;
    }

    # 缓存静态资源
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
