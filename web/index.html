<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="加财 - 智能家庭资产管理">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="加财">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>加财 - 智能家庭资产管理</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 从源头禁止 iOS Safari 左滑返回手势：
       touch-action: pan-y 告诉浏览器只响应垂直滑动，
       水平滑动手势不会被解释为"返回导航" */
    html, body {
      overscroll-behavior-x: none;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      touch-action: pan-y;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    /* 输入框等需要正常交互的元素恢复选择能力 */
    input, textarea, select, [contenteditable] {
      -webkit-user-select: auto;
      user-select: auto;
      touch-action: auto;
    }
  </style>
</head>
<body>
  <script>
    // 配置 Flutter 使用本地 CanvasKit
    window.flutterConfiguration = {
      canvasKitBaseUrl: "/canvaskit/"
    };

    // 防止 iOS Safari 左滑返回导致双重导航
    // 双重保险：CSS touch-action 已从源头阻止手势，这里防止其他方式触发的 popstate
    (function() {
      var _enabled = true;

      // 拦截所有 popstate 事件，阻止浏览器级后退影响 Flutter
      window.addEventListener('popstate', function(e) {
        if (!_enabled) return;
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        // 不使用 pushState！pushState 会短暂改变 URL 触发 Flutter 重渲染
        // 直接静默忽略即可，Flutter 内部 GoRouter 已完整处理所有导航
        return false;
      }, true);

      // 让 Flutter 内部的路由跳转可以正常修改 history
      // 通过标记位区分 Flutter 自己的 pushState 和浏览器手势触发的 popstate
      var origPush = history.pushState.bind(history);
      history.pushState = function() {
        _enabled = false;
        origPush.apply(this, arguments);
        // 微任务后恢复保护
        setTimeout(function() { _enabled = true; }, 0);
      };
      var origReplace = history.replaceState.bind(history);
      history.replaceState = function() {
        _enabled = false;
        origReplace.apply(this, arguments);
        setTimeout(function() { _enabled = true; }, 0);
      };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
