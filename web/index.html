<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="加财 - 智能家庭资产管理">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="加财">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>加财 - 智能家庭资产管理</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 防止 iOS Safari 左滑返回手势触发浏览器 history.back 导致双重导航 */
    html, body {
      overscroll-behavior-x: none;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <script>
    // 配置 Flutter 使用本地 CanvasKit
    window.flutterConfiguration = {
      canvasKitBaseUrl: "/canvaskit/"
    };

    // 修复 iOS Safari 左滑返回导致双重导航：
    // 在 popstate 事件中做防抖，阻止 Flutter 短时间内处理多次 pop
    (function() {
      var _popLock = false;
      var _origDispatch = window.dispatchEvent.bind(window);
      
      // 拦截 popstate 事件的分发
      window.addEventListener('popstate', function(e) {
        if (_popLock) {
          e.stopImmediatePropagation();
          return;
        }
        _popLock = true;
        setTimeout(function() { _popLock = false; }, 600);
      }, true); // useCapture=true 确保最先执行
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
