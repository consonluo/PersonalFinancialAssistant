<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="加财 - 智能家庭资产管理">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="加财">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>加财 - 智能家庭资产管理</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 防止 iOS Safari 左滑返回手势触发浏览器 history.back 导致双重导航 */
    html, body {
      overscroll-behavior-x: none;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <script>
    // 配置 Flutter 使用本地 CanvasKit
    window.flutterConfiguration = {
      canvasKitBaseUrl: "/canvaskit/"
    };

    // 完全禁止 Safari 左滑返回手势触发浏览器级 history.back
    // Flutter 内部 GoRouter 已完整处理所有导航，不需要浏览器的后退机制
    (function() {
      // 阻止 pushState/replaceState 以外的任何方式触发 popstate
      // Safari 手势返回会尝试调用 history.back()
      history.pushState({}, '', location.href);
      window.addEventListener('popstate', function(e) {
        // 立即 push 回来，抵消浏览器的后退
        history.pushState({}, '', location.href);
        e.preventDefault();
        e.stopPropagation();
        return false;
      });
      // 禁用 iOS Safari 的滑动返回手势（通过 CSS + touch 事件）
      document.addEventListener('touchstart', function(e) {
        // 只在页面最左边缘且方向向右时才可能触发返回手势
        if (e.touches[0].clientX < 15) {
          // 不阻止正常交互，但标记为边缘触摸
        }
      }, { passive: true });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
